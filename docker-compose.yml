services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.sandstorm
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - claude-credentials:/claude-credentials
    command: ["xvfb-run", "--auto-servernum", "npm", "run", "dev"]

volumes:
  node_modules:
  claude-credentials:
