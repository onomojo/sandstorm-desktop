name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install OS dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Install dependencies
        run: npm ci

      - name: Fix node-pty spawn-helper permissions
        run: find node_modules/node-pty -name spawn-helper -exec chmod +x {} \;

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild --only better-sqlite3

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Package
        run: npm run package

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: sandstorm-desktop-linux
          path: dist/*.AppImage
          retention-days: 14

      - name: Docker integration tests
        run: npm run test:integration:docker

      - name: E2E tests
        run: xvfb-run --server-num=51 npm run test:e2e

      - name: Integration tests
        run: npm run test:integration
