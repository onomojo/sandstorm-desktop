appId: com.sandstorm.desktop
productName: Sandstorm Desktop
npmRebuild: false
artifactName: "sandstorm-desktop-${version}.${ext}"
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
asarUnpack:
  - "**/*.node"
  - "**/spawn-helper"
extraResources:
  - from: sandstorm-cli
    to: sandstorm-cli
    filter:
      - "**/*"
  - from: resources/bin
    to: bin
    filter:
      - "sandstorm-scheduled-run.sh"
mac:
  target: [dmg]
  icon: resources/icon.icns
  category: public.app-category.developer-tools
  artifactName: "sandstorm-desktop-${version}-mac.${ext}"
win:
  target: [nsis]
  icon: resources/icon.ico
  artifactName: "sandstorm-desktop-${version}-win.${ext}"
linux:
  target: [AppImage]
  icon: resources/icon.png
  category: Development
  artifactName: "sandstorm-desktop-${version}-linux.${ext}"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
